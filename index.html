<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            /* Using Times New Roman with high-quality fallbacks */
            font-family: "Times New Roman", Times, "Apple Color Emoji", serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 800px;
        }
        p {
            font-size: 1.6rem;
            line-height: 1.5;
            text-align: left;
            /* This ensures the text looks clean and professional */
            word-spacing: 0.05rem;
        }
        /* Responsiveness for mobile phones */
        @media (max-width: 600px) {
            body {
                padding: 20px;
            }
            p {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p>
            Machrozet is a multi-disciplinary production company that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.
        </p>
    </div>
</body>
</html>
