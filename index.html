<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        /* This fixes an iOS Safari/Instagram in-app bug */
        html {
            height: -webkit-fill-available;
        }

        body {
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            
            /* Dynamic height for modern/in-app browsers */
            min-height: 100vh;
            min-height: 100dvh; 
            min-height: -webkit-fill-available; 
            
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
            overflow-y: auto; 
            padding-top: 10vh; 
        }

        /* Container for all central scrolling content */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 140px; 
            z-index: 2;
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 5; /* Keeps logo on top of the images */
        }

        .logo {
            width: 70%;
            max-width: 600px; 
            height: auto;
        }

        /* --- NEW ALIGNED IMAGE ROW SECTION --- */
        .image-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 90%;
            max-width: 1000px;
            gap: 4%; /* Space between the three columns */
            
            /* Pulls the row up so it tucks under the Hebrew text */
            margin-top: -6%; 
            position: relative;
            z-index: 3; 
        }

        .gallery-img {
            width: 30%; /* Forces images to take up 1/3 of the row */
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Container specifically for the 3rd slot (Flyer + Button) */
        .flyer-column {
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; /* Space between flyer and button */
        }

        .flyer {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* --- SMALLER CUSTOM BUTTON STYLE --- */
        .custom-ticket-button {
            font-family: "Times New Roman", Times, serif;
            font-size: 0.8rem; /* Shrunk font size */
            color: #000000;
            text-decoration: none;
            letter-spacing: 0.05rem;
            
            border: 1px solid #000000; 
            padding: 8px 24px; /* Reduced padding for a more subtle button */
            background-color: transparent;
            
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .custom-ticket-button:hover {
            background-color: #000000;
            color: #F2F1EA;
        }
