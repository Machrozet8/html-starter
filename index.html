<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        /* This fixes an iOS Safari/Instagram in-app bug */
        html {
            height: -webkit-fill-available;
        }

        body {
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; 
            
            /* Fallback for older browsers, then the dynamic height for modern/in-app browsers */
            min-height: 100vh;
            min-height: 100dvh; 
            min-height: -webkit-fill-available; 
            
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; /* Prevents horizontal scrolling */
            overflow-y: auto; /* Forces vertical scrolling to work */
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 2;
        }

        .logo {
            width: 80%;
            max-width: 650px; 
            height: auto;
        }

        .date {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.05rem;
        }

        .description {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            font-weight: normal;
        }

        /* Responsive layout for smaller screens */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                /* Changing this from center to flex-start prevents content from clipping at the top */
                justify-content: flex-start; 
            }
            .logo-container {
                margin-top: 20vh; /* Pushes the logo down slightly since we removed center justification */
            }
            .description {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 60px;
                max-width: 90%;
            }
            .date {
                position: relative;
                bottom: auto;
                margin-top: 30px;
                margin-bottom: 40px; /* Added extra padding to ensure it clears the IG bottom bar */
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="mach logo.png" alt="Machrozet" class="logo">
    </div>

    <div class="description">
        Machrozet is a multi-disciplinary production company that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.
    </div>

    <div class="date">
        2026.5686
    </div>

</body>
</html>
</body>
</html>
