<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        /* Fixes iOS Safari/Instagram in-app browser height bugs */
        html {
            height: -webkit-fill-available;
        }

        body {
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            
            min-height: 100vh;
            min-height: 100dvh; 
            min-height: -webkit-fill-available; 
            
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
            overflow-y: auto; 
            padding-top: 8vh; 
        }

        /* Central content container */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 160px; 
            z-index: 2;
        }

        /* --- LOGO CONTAINER --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 0px; 
        }

        .logo {
            width: 70%;
            max-width: 600px; 
            height: auto;
            display: block;
        }

        /* --- COLLAGE ROW SECTION --- */
        .image-row {
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Bottom aligns all elements */
            width: 95%;
            max-width: 900px;
            gap: 0; /* No gaps or padding between columns */
            
            margin-top: 15px; /* Pushes row right below the Hebrew characters */
            position: relative;
            z-index: 3; 
        }

        /* Enforced 3% size enlargement */
        .gallery-img {
            width: 27%; 
            height: auto;
            object-fit: cover;
            display: block;
        }

        /* Container for the poster element */
        .flyer-container {
            width: 27%; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flyer {
            width: 100%;
            height: auto;
            aspect-ratio: 2/3; 
            object-fit: cover;
            object-position: top;
            display: block;
        }

        /* --- DETAILS CAPTION BUTTON --- */
        .custom-ticket-button {
            position: absolute;
            top: calc(100% + 16px); /* Uniform spacing right after the aligned baseline */
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;

            font-family: "Times New Roman", Times, serif;
            font-size: 0.75rem; 
            color: #000000;
            text-decoration: none;
            letter-spacing: 0.05rem;
            
            border: 1px solid #000000; 
            padding: 6px 20px; 
            background-color: transparent;
            width: fit-content;
            text-align: center;
            
            transition: all 0.3s ease;
            text-transform: uppercase;
            z-index: 4;
        }

        .custom-ticket-button:hover {
            background-color: #000000;
            color: #F2F1EA;
        }
        /* --------------------------------- */

        .date {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.05rem;
        }

        .description {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            font-weight: normal;
        }

        .instagram-link {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 0.85rem;
            color: #000000;
            text-decoration: none; 
            border-bottom: 1px solid black; 
            letter-spacing: 0.02rem;
            z-index: 2;
            transition: opacity 0.2s ease;
        }

        .instagram-link:hover {
            opacity: 0.6; 
        }

        /* Responsive rules for mobile viewports */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                padding-top: 60px;
                justify-content: flex-start; 
            }
            .main-content {
                margin-bottom: 60px;
            }
            .logo {
                width: 90%;
            }
            .image-row {
                flex-direction: column;
                align-items: center;
                gap: 35px;
                margin-top: 30px; 
            }
            .gallery-img, .flyer-container {
                width: 80%; 
            }
            .flyer {
                aspect-ratio: auto; 
            }
            
            .custom-ticket-button {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin-top: 12px;
                display: inline-block;
                width: 80%;
            }
            
            .description {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 40px;
                max-width: 90%;
            }
            .date {
                position: relative;
                bottom: auto;
                margin-top: 30px;
                margin-bottom: 15px;
            }
            .instagram-link {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 10px;
                margin-bottom: 40px; 
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <div class="logo-container">
            <img src="mach logo.png" alt="Machrozet" class="logo">
        </div>

        <div class="image-row">
            
            <img src="4Z3A6444.jpg" alt="Machrozet Art 1" class="gallery-img">
            
            <img src="4Z3A6543.jpg" alt="Machrozet Art 2" class="gallery-img">
            
            <div class="flyer-container">
                <img src="STHL_0604.png" alt="Saw Thunder Heard Lightning Flyer" class="flyer">
                <a href="https://www.tickettailor.com/events/machrozetworks/2178845" target="_blank" class="custom-ticket-button">
                    Details 
                </a>
            </div>

        </div>

    </div>

    <div class="description">
        Machrozet is a multi-disciplinary studio that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.
    </div>

    <div class="date">
        2026.5686
    </div>

    <a href="https://instagram.com/machrozet8" target="_blank" class="instagram-link">Follow @machrozet8</a>

</body>
</html>
