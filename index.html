<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding: 15vh 40px 40px 40px;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        p {
            /* font-weight: 700 makes it bold/thicker */
            font-weight: 700;
            font-size: 1.65rem;
            line-height: 1.5;
            text-align: left;
            margin: 0;
            display: inline;
            letter-spacing: 0.01rem;
        }

        /* The Blinking Cursor - also made slightly thicker to match */
        .cursor {
            display: inline-block;
            width: 3px; 
            height: 1.8rem;
            background-color: black;
            margin-left: 4px;
            vertical-align: middle;
            position: relative;
            top: -2px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            body {
                padding-top: 10vh;
                padding-left: 20px;
                padding-right: 20px;
            }
            p {
                font-size: 1.4rem;
            }
            .cursor {
                height: 1.5rem;
                width: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <p>Machrozet is a multi-disciplinary production company that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.</p><span class="cursor"></span>
    </div>

</body>
</html>
