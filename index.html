<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        /* Fixes iOS Safari/Instagram in-app browser height bugs */
        html {
            height: -webkit-fill-available;
        }

        body {
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            
            min-height: 100vh;
            min-height: 100dvh; 
            min-height: -webkit-fill-available; 
            
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
            overflow-y: auto; 
            padding-top: 10vh; 
        }

        /* Central content container */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 140px; 
            z-index: 2;
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 5; /* Ensures logo sits cleanly over the images */
        }

        .logo {
            width: 70%;
            max-width: 600px; 
            height: auto;
        }

        /* --- COLLAGE ROW SECTION --- */
        .image-row {
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Anchors the flyer and button column to the bottom baseline of the photos */
            width: 90%;
            max-width: 800px;
            gap: 0; /* Absolute zero padding or gaps between the three elements */
            
            /* Pulls the image row up to align perfectly with the Hebrew text line */
            margin-top: -8%; 
            position: relative;
            z-index: 3; 
        }

        /* Locks alignment once the logo hits its maximum desktop scale width */
        @media (min-width: 857px) {
            .image-row {
                margin-top: -69px; 
            }
        }

        .gallery-img {
            width: 24%; /* Seamless structural sizing under the logo */
            height: auto;
            object-fit: cover;
            display: block;
        }

        /* Right Column: Holds the flyer image and its aligned button underneath */
        .flyer-column {
            width: 24%; /* Matches photo widths perfectly for row symmetry */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px; /* Clean, tight tracking space between flyer and details button */
        }

        .flyer {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            display: block;
        }

        /* --- DETAILS CAPTION BUTTON --- */
        .custom-ticket-button {
            font-family: "Times New Roman", Times, serif;
            font-size: 0.75rem; 
            color: #000000;
            text-decoration: none;
            letter-spacing: 0.05rem;
            
            border: 1px solid #000000; 
            padding: 6px 20px; 
            background-color: transparent;
            width: fit-content;
            text-align: center;
            
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .custom-ticket-button:hover {
            background-color: #000000;
            color: #F2F1EA;
        }
        /* --------------------------------- */

        .date {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.05rem;
        }

        .description {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            font-weight: normal;
        }

        .instagram-link {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 0.85rem;
            color: #000000;
            text-decoration: none; 
            border-bottom: 1px solid black; 
            letter-spacing: 0.02rem;
            z-index: 2;
            transition: opacity 0.2s ease;
        }

        .instagram-link:hover {
            opacity: 0.6; 
        }

        /* Clean responsive stacking fallback rules for mobile layout views */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                padding-top: 60px;
                justify-content: flex-start; 
            }
            .main-content {
                margin-bottom: 60px;
            }
            .logo {
                width: 90%;
            }
            .image-row {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                margin-top: 20px; /* Safely clears layout collision overlaps on small smartphone screens */
            }
            .gallery-img, .flyer-column {
                width: 75%; 
            }
            .custom-ticket-button {
                width: 80%;
            }
            
            .description {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 20px;
                max-width: 90%;
            }
            .date {
                position: relative;
                bottom: auto;
                margin-top: 30px;
                margin-bottom: 15px;
            }
            .instagram-link {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 10px;
                margin-bottom: 40px; 
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <div class="logo-container">
            <img src="mach logo.png" alt="Machrozet" class="logo">
        </div>

        <div class="image-row">
            
            <img src="4Z3A6444.jpg" alt="Machrozet Art 1" class="gallery-img">
            
            <img src="4Z3A6543.jpg" alt="Machrozet Art 2" class="gallery-img">
            
            <div class="flyer-column">
                <img src="0604_STHL.png" alt="Saw Thunder Heard Lightning Flyer" class="flyer">
                <a href="https://www.tickettailor.com/events/machrozetworks/2178845" target="_blank" class="custom-ticket-button">
                    Details 
                </a>
            </div>

        </div>

    </div>

    <div class="description">
        Machrozet is a multi-disciplinary studio that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.
    </div>

    <div class="date">
        2026.5686
    </div>

    <a href="https://instagram.com/machrozet8" target="_blank" class="instagram-link">Follow @machrozet8</a>

</body>
</html>
