<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        body {
            /* Matched to the warm off-white of the mockup */
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevents scrollbars on desktop */
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 2;
        }

        .logo {
            width: 80%;
            max-width: 650px; /* Adjust this value if you want the logo bigger/smaller */
            height: auto;
        }

        .date {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.05rem;
        }

        .description {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            font-weight: normal;
        }
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive layout for smaller screens */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                justify-content: center;
                overflow: auto;
            }
            .description {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 60px;
                max-width: 90%;
            }
            .date {
                position: relative;
                bottom: auto;
                margin-top: 30px;
                margin-bottom: 20px;
            }
            .logo-container {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="mach logo.png" alt="Machrozet" class="logo">
    </div>

    <div class="description">
        Machrozet is a multi-disciplinary studio that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.<span class="cursor"></span>
    </div>

    <div class="date">
        2026.5686
    </div>

</body>
</html>

</body>
</html>
