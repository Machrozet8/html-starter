<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        /* This fixes an iOS Safari/Instagram in-app bug */
        html {
            height: -webkit-fill-available;
        }

        body {
            background-color: #F2F1EA; 
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            
            /* Dynamic height for modern/in-app browsers */
            min-height: 100vh;
            min-height: 100dvh; 
            min-height: -webkit-fill-available; 
            
            position: relative;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
            overflow-y: auto; 
            padding-top: 10vh; 
        }

        /* Container for all central scrolling content */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 140px; 
            z-index: 2;
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 5; /* Keeps logo on top of the images */
        }

        .logo {
            width: 70%;
            max-width: 600px; 
            height: auto;
        }

        /* --- NEW ALIGNED IMAGE ROW SECTION --- */
        .image-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 90%;
            max-width: 1000px;
            gap: 4%; /* Space between the three columns */
            
            /* Pulls the row up so it tucks under the Hebrew text */
            margin-top: -6%; 
            position: relative;
            z-index: 3; 
        }

        .gallery-img {
            width: 30%; /* Forces images to take up 1/3 of the row */
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Container specifically for the 3rd slot (Flyer + Button) */
        .flyer-column {
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; /* Space between flyer and button */
        }

        .flyer {
            width: 100%;
            height: auto;
            aspect-ratio: 3/4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* --- SMALLER CUSTOM BUTTON STYLE --- */
        .custom-ticket-button {
            font-family: "Times New Roman", Times, serif;
            font-size: 0.8rem; /* Shrunk font size */
            color: #000000;
            text-decoration: none;
            letter-spacing: 0.05rem;
            
            border: 1px solid #000000; 
            padding: 8px 24px; /* Reduced padding for a more subtle button */
            background-color: transparent;
            
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .custom-ticket-button:hover {
            background-color: #000000;
            color: #F2F1EA;
        }
        /* --------------------------------- */

        .date {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 0.05rem;
        }

        .description {
            position: absolute;
            bottom: 40px;
            left: 40px;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            font-weight: normal;
        }

        .instagram-link {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 0.85rem;
            color: #000000;
            text-decoration: none; 
            border-bottom: 1px solid black; 
            letter-spacing: 0.02rem;
            z-index: 2;
            transition: opacity 0.2s ease;
        }

        .instagram-link:hover {
            opacity: 0.6; 
        }

        /* Responsive layout for mobile devices & Instagram app browser */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                padding-top: 60px;
                justify-content: flex-start; 
            }
            .main-content {
                margin-bottom: 60px;
            }
            .logo {
                width: 90%;
            }
            
            /* Stacks the images in a single column on phones */
            .image-row {
                flex-direction: column;
                align-items: center;
                gap: 40px;
                margin-top: 10px; /* Removes negative overlap on mobile */
            }
            .gallery-img, .flyer-column {
                width: 70%; /* Makes them larger on small screens */
            }
            
            .description {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 20px;
                max-width: 90%;
            }
            .date {
                position: relative;
                bottom: auto;
                margin-top: 30px;
                margin-bottom: 15px;
            }
            .instagram-link {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 10px;
                margin-bottom: 40px; 
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <div class="logo-container">
            <img src="mach logo.png" alt="Machrozet" class="logo">
        </div>

        <div class="image-row">
            
            <img src="4Z3A6444.jpg" alt="Machrozet Art 1" class="gallery-img">
            
            <img src="4Z3A6543.jpg" alt="Machrozet Art 2" class="gallery-img">
            
            <div class="flyer-column">
                <img src="0604_STHL.png" alt="Saw Thunder Heard Lightning Flyer" class="flyer">
                <a href="https://www.tickettailor.com/events/machrozetworks/2178845" target="_blank" class="custom-ticket-button">
                    Details 
                </a>
            </div>

        </div>

    </div>

    <div class="description">
        Machrozet is a multi-disciplinary studio that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.
    </div>

    <div class="date">
        2026.5686
    </div>

    <a href="https://instagram.com/machrozet8" target="_blank" class="instagram-link">Follow @machrozet8</a>

</body>
</html>
