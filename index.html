<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machrozet</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            display: flex;
            /* Changed from center to flex-start to move text higher */
            justify-content: center;
            align-items: flex-start; 
            /* Added top padding to control exactly how high the text is */
            padding: 15vh 40px 40px 40px;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        #typing-text {
            font-size: 1.6rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-wrap; /* Keeps the spacing natural */
        }

        /* The Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.6rem;
            background-color: black;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: black; }
        }

        @media (max-width: 600px) {
            body {
                padding-top: 10vh;
                padding-left: 20px;
                padding-right: 20px;
            }
            #typing-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <span id="typing-text"></span><span class="cursor"></span>
    </div>

    <script>
        const text = "Machrozet is a multi-disciplinary production company that produces, manages, and curates cultural programs, community events, and artistic performances for and in partnership with non-profits, cultural institutions, artists, and the general public.";
        const speed = 40; // The speed of typing in milliseconds
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        // Start the effect when the page loads
        window.onload = typeWriter;
    </script>

</body>
</html>
